services:
  web:
    build: ./app
    container_name: auto_deploy_web
    restart: unless-stopped
    environment:
      APP_VERSION: "1.0.0"

  nginx:
    image: nginx:1.27-alpine
    container_name: auto_deploy_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
