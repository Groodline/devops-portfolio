server {
    listen 80;
    server_name example.com www.example.com;

    root /var/www/devops-static-site;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/devops-static-site.access.log;
    error_log /var/log/nginx/devops-static-site.error.log;
}
