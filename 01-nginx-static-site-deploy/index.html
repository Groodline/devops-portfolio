<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>DevOps Static Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      max-width: 680px;
      background: #1f2937;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1 { margin-top: 0; font-size: 36px; }
    p { line-height: 1.6; color: #d1d5db; }
    code {
      background: #374151;
      padding: 3px 7px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Static website deployed with Nginx</h1>
    <p>Это простой сайт для DevOps-портфолио. Он показывает, что я умею размещать статичный сайт на Linux-сервере через Nginx.</p>
    <p>Stack: <code>Linux</code> <code>Nginx</code> <code>SSH</code></p>
  </main>
</body>
</html>
